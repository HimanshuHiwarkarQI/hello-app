steps:
  # Build Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/my-repo/hello-app:v1', '.']

  # Push Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/my-repo/hello-app:v1']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - hello-service
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/my-repo/hello-app:v1
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated